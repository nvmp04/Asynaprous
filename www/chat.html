<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Chat App</title>
</head>
<body>
<div id="login-section">
    <h3>Login</h3>
    <label>Username: <input id="username" type="text" value="admin"></label><br>
    <label>Password: <input id="password" type="password" value="password"></label><br><br>
    <button onclick="doLogin()">Login</button>
    <div id="login-msg"></div>
</div>

<div id="main-section" style="display:none">
    <b>Logged in as: <span id="display-user"></span> (port: <span id="display-port"></span>)</b>
    <hr>

    <h3>Active Peers (from tracker :2026)</h3>
    <div id="peer-list">Loading...</div>
    <button onclick="loadPeers()">Refresh</button>
    <hr>

    <h3>My Channels</h3>
    <div id="channel-list">Loading...</div>
    <button onclick="loadChannels()">Refresh channels</button>
    <hr>

    <h3>Chat</h3>
    <label>Channel (with user): <input id="chat-with" type="text" placeholder="username"></label>
    <button onclick="openChannel()">Open channel</button>
    <div id="messages" style="border:1px solid #ccc; height:200px; overflow-y:auto; padding:4px; margin-top:4px; font-family:monospace; font-size:13px;"></div>
    <br>
    <input id="msg-input" type="text" placeholder="Type message..." style="width:300px">
    <button onclick="sendMsg()">Send</button>
    <button onclick="broadcastMsg()">Broadcast to all</button>
    <hr>
</div>

<script>
var MY_PORT = 0;
var TRACKER_PORT = 2026;
var MY_USER = "";
var CURRENT_CHANNEL_WITH = "";
var POLL_INTERVAL = null;

function base(port) {
    return "http://localhost:" + port;
}

async function doLogin() {
    // SỬA TẠI ĐÂY: Tự động lấy port từ trình duyệt
    MY_PORT = parseInt(window.location.port) || 80;
    
    var username = document.getElementById("username").value;
    var password = document.getElementById("password").value;

    var resp = await fetch(base(MY_PORT) + "/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({username: username, password: password}),
        credentials: "include"
    });

    var data = await resp.json();
    if (resp.ok && data.username) {
        MY_USER = data.username;
        document.getElementById("login-section").style.display = "none";
        document.getElementById("main-section").style.display = "block";
        document.getElementById("display-user").textContent = MY_USER;
        document.getElementById("display-port").textContent = MY_PORT;
        document.getElementById("login-msg").textContent = "";

        // Gửi thông tin lên tracker
        await fetch(base(TRACKER_PORT) + "/submit-info", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({username: MY_USER, ip: "127.0.0.1", port: MY_PORT}),
            credentials: "include"
        });

        loadPeers();
        loadChannels();
        startPolling();
    } else {
        document.getElementById("login-msg").textContent = "Login failed: " + (data.message || "");
    }
}

async function loadPeers() {
    var resp = await fetch(base(TRACKER_PORT) + "/get-list", {credentials: "include"});
    var data = await resp.json();
    var peers = data.peers || {};
    var html = "";
    for (var u in peers) {
        if (u !== MY_USER) {
            html += u + " (" + peers[u].ip + ":" + peers[u].port + ") ";
            html += "<button onclick=\"connectPeer('" + u + "')\">Connect</button><br>";
        }
    }
    document.getElementById("peer-list").innerHTML = html || "(no other peers)";
}

async function connectPeer(target) {
    var resp = await fetch(base(MY_PORT) + "/connect-peer", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({username: target}),
        credentials: "include"
    });
    var data = await resp.json();
    alert(data.message);
    loadChannels();
}

async function loadChannels() {
    var resp = await fetch(base(MY_PORT) + "/get-channels", {credentials: "include"});
    var data = await resp.json();
    var channels = data.channels || [];
    var html = "";
    for (var i = 0; i < channels.length; i++) {
        var ch = channels[i];
        var parts = ch.split(":");
        var other = parts[0] === MY_USER ? parts[1] : parts[0];
        html += ch + " <button onclick=\"selectChannel('" + other + "')\">Open</button><br>";
    }
    document.getElementById("channel-list").innerHTML = html || "(no channels yet)";
}

function selectChannel(withUser) {
    CURRENT_CHANNEL_WITH = withUser;
    document.getElementById("chat-with").value = withUser;
    openChannel();
}

async function openChannel() {
    CURRENT_CHANNEL_WITH = document.getElementById("chat-with").value.trim();
    if (!CURRENT_CHANNEL_WITH) return;
    await loadMessages();
}

async function loadMessages() {
  if (!CURRENT_CHANNEL_WITH) return;
  var resp = await fetch(base(MY_PORT) + "/get-messages", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({"with": CURRENT_CHANNEL_WITH}),
    credentials: "include"
  });
  var data = await resp.json();
  var msgs = data.messages || [];
  var box = document.getElementById("messages");
  
  // SỬA TẠI ĐÂY: Dùng div để mỗi tin nhắn nằm trên một dòng riêng biệt
  var html = "";
  for (var i = 0; i < msgs.length; i++) {
    html += "<div style='margin-bottom: 5px;'><b>[" + msgs[i].from + "]</b>: " + msgs[i].message + "</div>";
  }
  
  box.innerHTML = html; 
  box.scrollTop = box.scrollHeight;
}

async function sendMsg() {
    var msg = document.getElementById("msg-input").value.trim();
    if (!msg || !CURRENT_CHANNEL_WITH) return;
    await fetch(base(MY_PORT) + "/send-peer", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({to: CURRENT_CHANNEL_WITH, message: msg}),
        credentials: "include"
    });
    document.getElementById("msg-input").value = "";
    await loadMessages();
}

async function broadcastMsg() {
    var msg = document.getElementById("msg-input").value.trim();
    if (!msg) return;
    await fetch(base(MY_PORT) + "/broadcast-peer", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: msg}),
        credentials: "include"
    });
    document.getElementById("msg-input").value = "";
    await loadMessages();
}

function startPolling() {
    if (POLL_INTERVAL) clearInterval(POLL_INTERVAL);
    POLL_INTERVAL = setInterval(function() {
        loadPeers();
        loadChannels();
        if (CURRENT_CHANNEL_WITH) loadMessages();
    }, 3000);
}
</script>
</body>
</html>
